<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperPing - Redirect</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #020408;
    color: #00ffc8;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center; padding: 20px;
  }
  .logo { font-size: 1.5rem; letter-spacing: 4px; text-shadow: 0 0 20px #00ffc8; }
  .msg  { font-size: 0.8rem; color: #4a7a6e; letter-spacing: 1px; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(0,255,200,0.2);
    border-top-color: #00ffc8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">SuperPing Redirect</div>
  <div class="spinner" id="spin"></div>
  <div class="msg" id="msg">Đang redirect...</div>

<script>
  const params = new URLSearchParams(location.search);
  const next   = params.get("to");

  function goNow() {
    if (next) window.location.href = next;
  }

  if (!next) {
    document.getElementById('msg').textContent = "Link không hợp lệ!";
    document.getElementById('spin').style.display = 'none';
  } else {
    // Redirect ngay lập tức
    window.location.replace(next);
  }
</script>
</body>
</html>
